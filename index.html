<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEMPMAIL — 임시 이메일</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=block" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --accent: #00ff88;
    --accent2: #ff3c6f;
    --text: #e8e8f0;
    --muted: #555570;
    --font-display: 'Syne', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
    --font-mono: 'Space Mono', 'Courier New', 'Courier', monospace;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-display);
    overflow-x: hidden;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 60px;
    animation: fadeDown 0.6s ease both;
  }

  header h1 {
    font-size: clamp(2rem, 6vw, 3.2rem);
    font-weight: 800;
    letter-spacing: -2px;
    line-height: 1;
  }

  header h1 span { color: var(--accent); }

  header .tagline {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    border-left: 2px solid var(--border);
    padding-left: 12px;
    line-height: 1.4;
  }

  /* EMAIL CARD */
  .email-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 32px;
    margin-bottom: 24px;
    animation: fadeUp 0.6s 0.1s ease both;
    position: relative;
    overflow: hidden;
  }

  .email-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent);
  }

  .email-label {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--accent);
    margin-bottom: 12px;
  }

  .email-display {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .email-address {
    font-family: var(--font-mono);
    font-size: clamp(0.9rem, 3vw, 1.3rem);
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.5px;
    flex: 1;
    min-width: 0;
    word-break: break-all;
    line-height: 1.2;
  }

  .email-address .domain { color: var(--muted); }

  .btn {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    padding: 10px 20px;
    border: 1px solid;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
    background: transparent;
    touch-action: manipulation;
  }

  .btn:active {
    transform: scale(0.98);
  }

  .btn-copy {
    border-color: var(--accent);
    color: var(--accent);
  }
  .btn-copy:hover, .btn-copy:active { background: var(--accent); color: var(--bg); }
  .btn-copy.copied { background: var(--accent); color: var(--bg); }

  .btn-new {
    border-color: var(--muted);
    color: var(--muted);
  }
  .btn-new:hover, .btn-new:active { border-color: var(--text); color: var(--text); }

  .btn-danger {
    border-color: var(--accent2);
    color: var(--accent2);
  }
  .btn-danger:hover, .btn-danger:active { background: var(--accent2); color: #fff; }

  .btn-send {
    border-color: var(--accent);
    color: var(--accent);
    padding: 12px 28px;
    font-size: 0.75rem;
  }
  .btn-send:hover, .btn-send:active { background: var(--accent); color: var(--bg); }
  .btn-send:disabled { opacity: 0.3; cursor: not-allowed; }

  /* CONTROLS ROW */
  .controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .timer {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--muted);
    margin-left: auto;
  }

  .timer span { color: var(--accent); }

  /* INBOX */
  .inbox-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    animation: fadeUp 0.6s 0.2s ease both;
    flex-wrap: wrap;
    gap: 10px;
  }

  .inbox-title {
    font-size: 0.8rem;
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--muted);
  }

  .badge {
    background: var(--accent);
    color: var(--bg);
    font-family: var(--font-mono);
    font-size: 0.6rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
  }

  .refresh-btn {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 2px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
    touch-action: manipulation;
  }
  .refresh-btn:hover { color: var(--text); border-color: var(--muted); }
  .refresh-btn:active { transform: scale(0.95); }
  .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .refresh-btn.spinning .icon { animation: spin 0.6s linear infinite; }

  .inbox-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
    animation: fadeUp 0.6s 0.3s ease both;
  }

  .empty-state {
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: 4px;
    padding: 48px 20px;
    text-align: center;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 0.75rem;
    line-height: 2;
  }

  .empty-state .big { font-size: 2rem; display: block; margin-bottom: 12px; opacity: 0.3; }

  .mail-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 16px 20px;
    cursor: pointer;
    transition: all 0.15s ease;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 4px 16px;
    align-items: start;
    touch-action: manipulation;
  }

  .mail-item:hover { border-color: var(--accent); background: #161622; }
  .mail-item:active { transform: scale(0.98); }
  .mail-item.unread { border-left: 2px solid var(--accent); }

  .mail-from {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--text);
    font-weight: 700;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .mail-subject {
    font-size: 0.85rem;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    grid-column: 1;
  }

  .mail-item.unread .mail-subject { color: var(--text); }

  .mail-time {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--muted);
    grid-row: 1 / 3;
    grid-column: 2;
    align-self: center;
    white-space: nowrap;
  }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    width: 100%;
    max-width: 640px;
    max-height: 80vh;
    overflow-y: auto;
    position: relative;
    transform: translateY(20px);
    transition: transform 0.2s ease;
  }

  .modal-overlay.open .modal { transform: translateY(0); }

  .modal::before {
    content: '';
    position: sticky;
    top: 0;
    display: block;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .modal-header {
    padding: 24px 28px 16px;
    border-bottom: 1px solid var(--border);
  }

  .modal-subject {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 12px;
  }

  .modal-meta {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--muted);
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .modal-meta span { color: var(--text); }

  .modal-body {
    padding: 24px 28px;
    font-size: 0.9rem;
    line-height: 1.7;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .modal-close {
    position: absolute;
    top: 16px; right: 20px;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 1.4rem;
    cursor: pointer;
    line-height: 1;
    transition: color 0.15s;
    padding: 8px;
    touch-action: manipulation;
  }
  .modal-close:hover, .modal-close:active { color: var(--accent2); }

  /* COMPOSE PANEL */
  .compose-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 28px 32px;
    margin-top: 32px;
    animation: fadeUp 0.6s 0.4s ease both;
    position: relative;
    overflow: hidden;
  }

  .compose-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent2), transparent);
  }

  .compose-title {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--accent2);
    margin-bottom: 20px;
  }

  .field {
    margin-bottom: 16px;
  }

  .field label {
    display: block;
    font-family: var(--font-mono);
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .field input, .field textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 0.8rem;
    outline: none;
    transition: border-color 0.15s;
  }

  .field input:focus, .field textarea:focus {
    border-color: var(--accent2);
  }

  .field textarea {
    resize: vertical;
    min-height: 100px;
    line-height: 1.6;
  }

  .compose-actions {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  .send-status {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--accent);
    display: none;
  }

  /* DEBUG PANEL */
  .debug-panel {
    background: rgba(255,60,111,0.1);
    border: 1px solid var(--accent2);
    border-radius: 4px;
    padding: 16px;
    margin-top: 32px;
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--text);
    display: none;
    max-height: 200px;
    overflow-y: auto;
  }

  .debug-panel.show { display: block; }

  .debug-log {
    margin-bottom: 8px;
    padding: 4px 8px;
    background: rgba(0,0,0,0.3);
    border-radius: 2px;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: var(--bg);
    font-family: var(--font-mono);
    font-size: 0.7rem;
    font-weight: 700;
    padding: 10px 24px;
    border-radius: 2px;
    z-index: 200;
    opacity: 0;
    transition: all 0.3s ease;
    white-space: nowrap;
    max-width: 90%;
    text-align: center;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--accent2); color: #fff; }

  @keyframes fadeDown { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: none; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
  @keyframes spin { to { transform: rotate(360deg); } }

  .icon { display: inline-block; }

  @media (max-width: 520px) {
    .wrapper { padding: 24px 16px 60px; }
    header { margin-bottom: 40px; }
    .email-display { flex-direction: column; align-items: flex-start; }
    .controls { justify-content: flex-start; }
    .timer { margin-left: 0; width: 100%; }
    .compose-panel { padding: 20px; }
    .email-card { padding: 20px; }
    .toast { bottom: 16px; font-size: 0.65rem; padding: 8px 16px; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <h1>TEMP<span>MAIL</span></h1>
    <p class="tagline">일회용 이메일<br>즉시 생성</p>
  </header>

  <!-- EMAIL CARD -->
  <div class="email-card">
    <div class="email-label">// 현재 이메일 주소</div>
    <div class="email-display">
      <div class="email-address" id="emailDisplay">
        <span id="emailUser">불러오는 중...</span><span class="domain"></span>
      </div>
      <button class="btn btn-copy" id="copyBtn" onclick="copyEmail()">복사</button>
    </div>
    <div class="controls">
      <button class="btn btn-new" onclick="generateNew()">새 주소 생성</button>
      <div class="timer">만료까지 <span id="timerDisplay">—</span></div>
    </div>
  </div>

  <!-- INBOX -->
  <div class="inbox-header">
    <div class="inbox-title">받은 편지함 <span class="badge" id="unreadBadge" style="display:none">0</span></div>
    <button class="refresh-btn" id="refreshBtn" onclick="checkMail()" title="이메일 새로고침">
      <span class="icon" id="refreshIcon">↻</span> 새로고침
    </button>
  </div>

  <div class="inbox-list" id="inboxList">
    <div class="empty-state">
      <span class="big">📭</span>
      받은 메일이 없습니다<br>
      이 주소로 이메일을 보내보세요
    </div>
  </div>

  <!-- COMPOSE -->
  <div class="compose-panel">
    <div class="compose-title">// 이메일 보내기</div>
    <div class="field">
      <label>받는 사람</label>
      <input type="email" id="sendTo" placeholder="example@domain.com">
    </div>
    <div class="field">
      <label>제목</label>
      <input type="text" id="sendSubject" placeholder="제목을 입력하세요">
    </div>
    <div class="field">
      <label>내용</label>
      <textarea id="sendBody" placeholder="내용을 입력하세요..."></textarea>
    </div>
    <div class="compose-actions">
      <button class="btn btn-send" id="sendBtn" onclick="sendEmail()">전송</button>
      <span class="send-status" id="sendStatus">전송 중...</span>
    </div>
  </div>

  <!-- DEBUG PANEL -->
  <div class="debug-panel" id="debugPanel">
    <div style="color: var(--accent2); margin-bottom: 8px;">🔧 디버그 로그 (개발용)</div>
    <div id="debugLog"></div>
  </div>

</div>

<!-- MAIL MODAL -->
<div class="modal-overlay" id="mailModal" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModalDirect()">×</button>
    <div class="modal-header">
      <div class="modal-subject" id="modalSubject"></div>
      <div class="modal-meta">
        <div>보낸 사람: <span id="modalFrom"></span></div>
        <div>받은 시간: <span id="modalTime"></span></div>
      </div>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  // ─── UTILITY FUNCTIONS ────────────────────────────────────────
  function randomStr(len) {
    const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
    let result = '';
    for (let i = 0; i < len; i++) {
      result += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    return result;
  }

  function escHtml(str) {
    if (typeof str !== 'string') return '';
    const map = {
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#039;'
    };
    return str.replace(/[&<>"']/g, m => map[m]);
  }

  function formatTime(ts) {
    const d = new Date(ts * 1000);
    const now = new Date();
    const diff = Math.floor((now - d) / 1000);
    if (diff < 60) return '방금 전';
    if (diff < 3600) return Math.floor(diff / 60) + '분 전';
    if (diff < 86400) return Math.floor(diff / 3600) + '시간 전';
    return Math.floor(diff / 86400) + '일 전';
  }

  function showToast(msg, isError = false) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = `toast show ${isError ? 'error' : ''}`;
    setTimeout(() => {
      toast.classList.remove('show');
    }, 3000);
  }

  // ─── STATE ───────────────────────────────────────────────────
  let currentEmail = '';
  let sessionToken = '';
  let emails = [];
  let timerSec = 600; // 10분
  let timerInterval = null;
  let refreshInterval = null;
  let isRefreshing = false;
  let debugLogs = [];
  let DEBUG_MODE = true;

  const API = '/api/handler';

  // ─── DEBUG ────────────────────────────────────────────────────
  function addDebugLog(msg, type = 'info') {
    const timestamp = new Date().toLocaleTimeString('ko-KR');
    const logEntry = `[${timestamp}] ${msg}`;
    debugLogs.push(logEntry);
    
    const debugLog = document.getElementById('debugLog');
    const logEl = document.createElement('div');
    logEl.className = `debug-log`;
    logEl.textContent = logEntry;
    debugLog.appendChild(logEl);
    debugLog.scrollTop = debugLog.scrollHeight;
    
    if (debugLogs.length > 20) {
      debugLogs.shift();
      debugLog.removeChild(debugLog.firstChild);
    }
  }

  // ─── INIT ─────────────────────────────────────────────────────
  async function init() {
    addDebugLog('앱 초기화 시작...');
    
    if (DEBUG_MODE) {
      document.getElementById('debugPanel').classList.add('show');
    }

    await getEmail();
    startTimer();
    startAutoRefresh();
  }

  async function getEmail() {
    addDebugLog('이메일 주소 요청 중...');
    
    try {
      const url = `${API}?f=get_email_address&lang=ko`;
      addDebugLog(`요청 URL: ${url}`);
      
      const res = await fetch(url);
      addDebugLog(`응답 상태: ${res.status}`);
      
      if (!res.ok) {
        throw new Error(`HTTP ${res.status}`);
      }
      
      const data = await res.json();
      addDebugLog(`응답: ${JSON.stringify(data).substring(0, 100)}`);
      
      if (!data.email_addr) {
        throw new Error('No email address returned');
      }
      
      currentEmail = data.email_addr;
      sessionToken = data.sid_token || '';
      displayEmail(currentEmail);
      showToast('새 이메일 주소가 생성되었습니다');
      addDebugLog(`✓ 이메일 생성: ${currentEmail}`);
      checkMail();
    } catch (e) {
      addDebugLog(`✗ 오류: ${e.message}`, 'error');
      console.error('getEmail error:', e);
      
      // Fallback: generate random address for demo
      const user = randomStr(10);
      currentEmail = `${user}@guerrillamailblock.com`;
      sessionToken = '';
      displayEmail(currentEmail);
      showToast('⚠️ API 연결 오류 - 데모 모드', true);
      addDebugLog('💡 Vercel 함수 로그를 확인하세요');
    }
  }

  function displayEmail(email) {
    const parts = email.split('@');
    const user = parts[0];
    const domain = parts[1] || '';
    document.getElementById('emailUser').textContent = user;
    document.querySelector('.domain').textContent = `@${domain}`;
  }

  // ─── GENERATE NEW ─────────────────────────────────────────────
  async function generateNew() {
    addDebugLog('새 주소 생성 중...');
    emails = [];
    renderInbox();
    timerSec = 600;
    await getEmail();
  }

  // ─── COPY ─────────────────────────────────────────────────────
  function copyEmail() {
    navigator.clipboard.writeText(currentEmail).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = '복사됨!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = '복사';
        btn.classList.remove('copied');
      }, 1500);
      showToast('클립보드에 복사되었습니다');
      addDebugLog('✓ 복사 완료');
    });
  }

  // ─── CHECK MAIL ───────────────────────────────────────────────
  async function checkMail() {
    if (isRefreshing) {
      addDebugLog('이미 진행 중...');
      return;
    }
    
    const btn = document.getElementById('refreshBtn');
    btn.disabled = true;
    btn.classList.add('spinning');
    isRefreshing = true;

    addDebugLog('메일 확인...');

    try {
      const url = `${API}?f=get_email_list&offset=0&seq=0&sid_token=${encodeURIComponent(sessionToken)}`;
      const res = await fetch(url);
      
      addDebugLog(`상태: ${res.status}`);
      
      if (!res.ok) {
        throw new Error(`HTTP ${res.status}`);
      }
      
      const data = await res.json();
      addDebugLog(`응답: ${data.list ? data.list.length + '개' : '없음'}`);

      if (data.list && Array.isArray(data.list) && data.list.length > 0) {
        const newEmails = data.list.filter(m => !emails.find(e => e.mail_id === m.mail_id));
        if (newEmails.length > 0) {
          emails = data.list;
          renderInbox();
          showToast(`새 메일 ${newEmails.length}개 도착!`);
          addDebugLog(`✓ ${newEmails.length}개 수신`);
        } else {
          addDebugLog('새 메일 없음');
        }
      } else {
        addDebugLog('받은 메일 없음');
      }
    } catch (e) {
      addDebugLog(`✗ 오류: ${e.message}`, 'error');
      console.error('checkMail error:', e);
    }

    btn.classList.remove('spinning');
    btn.disabled = false;
    isRefreshing = false;
  }

  function renderInbox() {
    const list = document.getElementById('inboxList');
    const badge = document.getElementById('unreadBadge');

    if (emails.length === 0) {
      badge.style.display = 'none';
      list.innerHTML = `
        <div class="empty-state">
          <span class="big">📭</span>
          받은 메일이 없습니다<br>
          이 주소로 이메일을 보내보세요
        </div>`;
      return;
    }

    const unread = emails.filter(m => m.mail_read === '0').length;
    if (unread > 0) {
      badge.style.display = '';
      badge.textContent = unread;
    } else {
      badge.style.display = 'none';
    }

    list.innerHTML = emails.map(m => `
      <div class="mail-item ${m.mail_read === '0' ? 'unread' : ''}" onclick="openMail('${escHtml(m.mail_id)}')">
        <div class="mail-from">${escHtml(m.mail_from)}</div>
        <div class="mail-time">${formatTime(m.mail_timestamp)}</div>
        <div class="mail-subject">${escHtml(m.mail_subject) || '(제목 없음)'}</div>
      </div>
    `).join('');
  }

  async function openMail(mailId) {
    addDebugLog(`메일 열기: ${mailId.substring(0, 15)}...`);
    
    try {
      const url = `${API}?f=fetch_email&email_id=${encodeURIComponent(mailId)}&sid_token=${encodeURIComponent(sessionToken)}`;
      const res = await fetch(url);
      
      if (!res.ok) {
        throw new Error(`HTTP ${res.status}`);
      }
      
      const m = await res.json();

      document.getElementById('modalSubject').textContent = m.mail_subject || '(제목 없음)';
      document.getElementById('modalFrom').textContent = m.mail_from;
      document.getElementById('modalTime').textContent = new Date(m.mail_timestamp * 1000).toLocaleString('ko-KR');

      const tempDiv = document.createElement('div');
      tempDiv.innerHTML = m.mail_body || m.mail_excerpt || '(내용 없음)';
      document.getElementById('modalBody').textContent = tempDiv.innerText || tempDiv.textContent;

      document.getElementById('mailModal').classList.add('open');

      const idx = emails.findIndex(e => e.mail_id === mailId);
      if (idx !== -1) emails[idx].mail_read = '1';
      renderInbox();
      
      addDebugLog('✓ 메일 열기 성공');
    } catch (e) {
      addDebugLog(`✗ 오류: ${e.message}`, 'error');
      console.error('openMail error:', e);
      showToast('메일을 불러올 수 없습니다', true);
    }
  }

  function closeModal(e) {
    if (e.target === document.getElementById('mailModal')) closeModalDirect();
  }

  function closeModalDirect() {
    document.getElementById('mailModal').classList.remove('open');
  }

  // ─── SEND EMAIL ───────────────────────────────────────────────
  async function sendEmail() {
    const to = document.getElementById('sendTo').value.trim();
    const subject = document.getElementById('sendSubject').value.trim();
    const body = document.getElementById('sendBody').value.trim();

    addDebugLog(`전송: to=${to}`);

    if (!to || !subject || !body) {
      showToast('모든 필드를 입력해주세요', true);
      addDebugLog('✗ 빈 필드');
      return;
    }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(to)) {
      showToast('올바른 이메일 주소를 입력해주세요', true);
      addDebugLog('✗ 주소 형식 오류');
      return;
    }

    const btn = document.getElementById('sendBtn');
    const status = document.getElementById('sendStatus');
    btn.disabled = true;
    status.style.display = 'block';

    try {
      const formData = new URLSearchParams({
        f: 'send_email',
        sid_token: sessionToken,
        to: to,
        subject: subject,
        body: body,
        from: currentEmail
      });

      addDebugLog('API 요청...');

      const res = await fetch(`${API}`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded',
        },
        body: formData.toString()
      });

      addDebugLog(`상태: ${res.status}`);

      if (!res.ok) {
        throw new Error(`HTTP ${res.status}`);
      }
      
      const data = await res.json();
      addDebugLog(`응답: ${JSON.stringify(data).substring(0, 80)}`);

      if (data.result === 'success' || data.ok === true || data.email_addr) {
        showToast('이메일이 전송되었습니다 ✓');
        document.getElementById('sendTo').value = '';
        document.getElementById('sendSubject').value = '';
        document.getElementById('sendBody').value = '';
        addDebugLog('✓ 전송 성공');
      } else {
        showToast('전송 실패. 다시 시도하세요', true);
        addDebugLog('✗ 전송 실패');
      }
    } catch (e) {
      addDebugLog(`✗ 오류: ${e.message}`, 'error');
      console.error('sendEmail error:', e);
      showToast('이메일 전송 중 오류가 발생했습니다', true);
    } finally {
      btn.disabled = false;
      status.style.display = 'none';
    }
  }

  // ─── TIMER ────────────────────────────────────────────────────
  function startTimer() {
    updateTimerDisplay();
    timerInterval = setInterval(() => {
      timerSec--;
      updateTimerDisplay();
      if (timerSec <= 0) {
        clearInterval(timerInterval);
        generateNew();
      }
    }, 1000);
  }

  function updateTimerDisplay() {
    const min = Math.floor(timerSec / 60);
    const sec = timerSec % 60;
    const display = `${min}:${sec < 10 ? '0' : ''}${sec}`;
    document.getElementById('timerDisplay').textContent = display;
  }

  // ─── AUTO REFRESH ─────────────────────────────────────────────
  function startAutoRefresh() {
    refreshInterval = setInterval(() => {
      checkMail();
    }, 30000);
  }

  // ─── START ────────────────────────────────────────────────────
  init();
</script>
</body>
</html>
