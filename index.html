<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEMPMAIL — 임시 이메일</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --accent: #00ff88;
    --accent2: #ff3c6f;
    --text: #e8e8f0;
    --muted: #555570;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'Space Mono', monospace;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-display);
    overflow-x: hidden;
  }

  /* BACKGROUND GRID */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* NOISE OVERLAY */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 60px;
    animation: fadeDown 0.6s ease both;
  }

  header h1 {
    font-size: clamp(2rem, 6vw, 3.2rem);
    font-weight: 800;
    letter-spacing: -2px;
    line-height: 1;
  }

  header h1 span { color: var(--accent); }

  header .tagline {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    border-left: 2px solid var(--border);
    padding-left: 12px;
  }

  /* EMAIL CARD */
  .email-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 32px;
    margin-bottom: 24px;
    animation: fadeUp 0.6s 0.1s ease both;
    position: relative;
    overflow: hidden;
  }

  .email-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent);
  }

  .email-label {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--accent);
    margin-bottom: 12px;
  }

  .email-display {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .email-address {
    font-family: var(--font-mono);
    font-size: clamp(1rem, 3vw, 1.4rem);
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.5px;
    flex: 1;
    min-width: 200px;
    word-break: break-all;
  }

  .email-address .domain { color: var(--muted); }

  .btn {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    padding: 10px 20px;
    border: 1px solid;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
    background: transparent;
  }

  .btn-copy {
    border-color: var(--accent);
    color: var(--accent);
  }
  .btn-copy:hover { background: var(--accent); color: var(--bg); }
  .btn-copy.copied { background: var(--accent); color: var(--bg); }

  .btn-new {
    border-color: var(--muted);
    color: var(--muted);
  }
  .btn-new:hover { border-color: var(--text); color: var(--text); }

  .btn-danger {
    border-color: var(--accent2);
    color: var(--accent2);
  }
  .btn-danger:hover { background: var(--accent2); color: #fff; }

  .btn-send {
    border-color: var(--accent);
    color: var(--accent);
    padding: 12px 28px;
    font-size: 0.75rem;
  }
  .btn-send:hover { background: var(--accent); color: var(--bg); }
  .btn-send:disabled { opacity: 0.3; cursor: not-allowed; }

  /* CONTROLS ROW */
  .controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .timer {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--muted);
    margin-left: auto;
  }

  .timer span { color: var(--accent); }

  /* INBOX */
  .inbox-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    animation: fadeUp 0.6s 0.2s ease both;
  }

  .inbox-title {
    font-size: 0.8rem;
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--muted);
  }

  .badge {
    background: var(--accent);
    color: var(--bg);
    font-family: var(--font-mono);
    font-size: 0.6rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
  }

  .refresh-btn {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 2px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
  }
  .refresh-btn:hover { color: var(--text); border-color: var(--muted); }
  .refresh-btn.spinning .icon { animation: spin 0.6s linear infinite; }

  .inbox-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
    animation: fadeUp 0.6s 0.3s ease both;
  }

  .empty-state {
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: 4px;
    padding: 48px;
    text-align: center;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 0.75rem;
    line-height: 2;
  }

  .empty-state .big { font-size: 2rem; display: block; margin-bottom: 12px; opacity: 0.3; }

  .mail-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 16px 20px;
    cursor: pointer;
    transition: all 0.15s ease;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 4px 16px;
    align-items: start;
  }

  .mail-item:hover { border-color: var(--accent); background: #161622; }
  .mail-item.unread { border-left: 2px solid var(--accent); }

  .mail-from {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--text);
    font-weight: 700;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .mail-subject {
    font-size: 0.85rem;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    grid-column: 1;
  }

  .mail-item.unread .mail-subject { color: var(--text); }

  .mail-time {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--muted);
    grid-row: 1 / 3;
    grid-column: 2;
    align-self: center;
    white-space: nowrap;
  }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    width: 100%;
    max-width: 640px;
    max-height: 80vh;
    overflow-y: auto;
    position: relative;
    transform: translateY(20px);
    transition: transform 0.2s ease;
  }

  .modal-overlay.open .modal { transform: translateY(0); }

  .modal::before {
    content: '';
    position: sticky;
    top: 0;
    display: block;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .modal-header {
    padding: 24px 28px 16px;
    border-bottom: 1px solid var(--border);
  }

  .modal-subject {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 12px;
  }

  .modal-meta {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--muted);
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .modal-meta span { color: var(--text); }

  .modal-body {
    padding: 24px 28px;
    font-size: 0.9rem;
    line-height: 1.7;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .modal-close {
    position: absolute;
    top: 16px; right: 20px;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 1.4rem;
    cursor: pointer;
    line-height: 1;
    transition: color 0.15s;
  }
  .modal-close:hover { color: var(--accent2); }

  /* COMPOSE PANEL */
  .compose-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 28px 32px;
    margin-top: 32px;
    animation: fadeUp 0.6s 0.4s ease both;
    position: relative;
    overflow: hidden;
  }

  .compose-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent2), transparent);
  }

  .compose-title {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--accent2);
    margin-bottom: 20px;
  }

  .field {
    margin-bottom: 16px;
  }

  .field label {
    display: block;
    font-family: var(--font-mono);
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .field input, .field textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 0.8rem;
    outline: none;
    transition: border-color 0.15s;
  }

  .field input:focus, .field textarea:focus {
    border-color: var(--accent2);
  }

  .field textarea {
    resize: vertical;
    min-height: 100px;
    line-height: 1.6;
  }

  .compose-actions {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 8px;
  }

  .send-status {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--accent);
    display: none;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: var(--bg);
    font-family: var(--font-mono);
    font-size: 0.7rem;
    font-weight: 700;
    padding: 10px 24px;
    border-radius: 2px;
    z-index: 200;
    opacity: 0;
    transition: all 0.3s ease;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--accent2); color: #fff; }

  @keyframes fadeDown { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: none; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
  @keyframes spin { to { transform: rotate(360deg); } }

  .icon { display: inline-block; }

  @media (max-width: 520px) {
    .email-display { flex-direction: column; align-items: flex-start; }
    .controls { justify-content: flex-start; }
    .timer { margin-left: 0; width: 100%; }
    .compose-panel { padding: 20px; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <h1>TEMP<span>MAIL</span></h1>
    <p class="tagline">일회용 이메일<br>즉시 생성</p>
  </header>

  <!-- EMAIL CARD -->
  <div class="email-card">
    <div class="email-label">// 현재 이메일 주소</div>
    <div class="email-display">
      <div class="email-address" id="emailDisplay">
        <span id="emailUser">불러오는 중...</span><span class="domain"></span>
      </div>
      <button class="btn btn-copy" id="copyBtn" onclick="copyEmail()">복사</button>
    </div>
    <div class="controls">
      <button class="btn btn-new" onclick="generateNew()">새 주소 생성</button>
      <div class="timer">만료까지 <span id="timerDisplay">—</span></div>
    </div>
  </div>

  <!-- INBOX -->
  <div class="inbox-header">
    <div class="inbox-title">받은 편지함 <span class="badge" id="unreadBadge" style="display:none">0</span></div>
    <button class="refresh-btn" id="refreshBtn" onclick="checkMail()">
      <span class="icon" id="refreshIcon">↻</span> 새로고침
    </button>
  </div>

  <div class="inbox-list" id="inboxList">
    <div class="empty-state">
      <span class="big">📭</span>
      받은 메일이 없습니다<br>
      이 주소로 이메일을 보내보세요
    </div>
  </div>

  <!-- COMPOSE -->
  <div class="compose-panel">
    <div class="compose-title">// 이메일 보내기</div>
    <div class="field">
      <label>받는 사람</label>
      <input type="email" id="sendTo" placeholder="example@domain.com">
    </div>
    <div class="field">
      <label>제목</label>
      <input type="text" id="sendSubject" placeholder="제목을 입력하세요">
    </div>
    <div class="field">
      <label>내용</label>
      <textarea id="sendBody" placeholder="내용을 입력하세요..."></textarea>
    </div>
    <div class="compose-actions">
      <button class="btn btn-send" id="sendBtn" onclick="sendEmail()">전송</button>
      <span class="send-status" id="sendStatus">전송 중...</span>
    </div>
  </div>

</div>

<!-- MAIL MODAL -->
<div class="modal-overlay" id="mailModal" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModalDirect()">×</button>
    <div class="modal-header">
      <div class="modal-subject" id="modalSubject"></div>
      <div class="modal-meta">
        <div>보낸 사람: <span id="modalFrom"></span></div>
        <div>받은 시간: <span id="modalTime"></span></div>
      </div>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  // ─── STATE ───────────────────────────────────────────────────
  let currentEmail = '';
  let sessionToken = '';
  let emails = [];
  let timerSec = 600; // 10분
  let timerInterval = null;
  let refreshInterval = null;

  const API = '/api/mail';

  // ─── INIT ─────────────────────────────────────────────────────
  async function init() {
    await getEmail();
    startTimer();
    startAutoRefresh();
  }

  async function getEmail() {
    try {
      const res = await fetch(`${API}?f=get_email_address&lang=ko`);
      const data = await res.json();
      currentEmail = data.email_addr;
      sessionToken = data.sid_token;
      displayEmail(currentEmail);
      showToast('새 이메일 주소가 생성되었습니다');
      checkMail();
    } catch (e) {
      // Fallback: generate random address for demo
      const user = randomStr(10);
      currentEmail = `${user}@guerrillamailblock.com`;
      sessionToken = '';
      displayEmail(currentEmail);
      showToast('오프라인 모드 — 데모용 주소 생성', true);
    }
  }

  function displayEmail(email) {
    const [user, domain] = email.split('@');
    document.getElementById('emailUser').textContent = user;
    document.querySelector('.domain').textContent = `@${domain}`;
  }

  // ─── GENERATE NEW ─────────────────────────────────────────────
  async function generateNew() {
    emails = [];
    renderInbox();
    timerSec = 600;
    await getEmail();
  }

  // ─── COPY ─────────────────────────────────────────────────────
  function copyEmail() {
    navigator.clipboard.writeText(currentEmail).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = '복사됨!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = '복사';
        btn.classList.remove('copied');
      }, 1500);
      showToast('클립보드에 복사되었습니다');
    });
  }

  // ─── CHECK MAIL ───────────────────────────────────────────────
  async function checkMail() {
    const btn = document.getElementById('refreshBtn');
    btn.classList.add('spinning');

    try {
      const res = await fetch(`${API}?f=get_email_list&offset=0&seq=0&sid_token=${sessionToken}`);
      const data = await res.json();

      if (data.list && data.list.length > 0) {
        const newEmails = data.list.filter(m => !emails.find(e => e.mail_id === m.mail_id));
        if (newEmails.length > 0) {
          emails = data.list;
          renderInbox();
          if (newEmails.length > 0 && emails.length > 0) {
            showToast(`새 메일 ${newEmails.length}개 도착!`);
          }
        }
      }
    } catch (e) {
      // silent fail
    }

    btn.classList.remove('spinning');
  }

  function renderInbox() {
    const list = document.getElementById('inboxList');
    const badge = document.getElementById('unreadBadge');

    if (emails.length === 0) {
      badge.style.display = 'none';
      list.innerHTML = `
        <div class="empty-state">
          <span class="big">📭</span>
          받은 메일이 없습니다<br>
          이 주소로 이메일을 보내보세요
        </div>`;
      return;
    }

    const unread = emails.filter(m => m.mail_read === '0').length;
    if (unread > 0) {
      badge.style.display = '';
      badge.textContent = unread;
    } else {
      badge.style.display = 'none';
    }

    list.innerHTML = emails.map(m => `
      <div class="mail-item ${m.mail_read === '0' ? 'unread' : ''}" onclick="openMail('${m.mail_id}')">
        <div class="mail-from">${escHtml(m.mail_from)}</div>
        <div class="mail-time">${formatTime(m.mail_timestamp)}</div>
        <div class="mail-subject">${escHtml(m.mail_subject) || '(제목 없음)'}</div>
      </div>
    `).join('');
  }

  async function openMail(mailId) {
    try {
      const res = await fetch(`${API}?f=fetch_email&email_id=${mailId}&sid_token=${sessionToken}`);
      const m = await res.json();

      document.getElementById('modalSubject').textContent = m.mail_subject || '(제목 없음)';
      document.getElementById('modalFrom').textContent = m.mail_from;
      document.getElementById('modalTime').textContent = new Date(m.mail_timestamp * 1000).toLocaleString('ko-KR');

      // Strip HTML tags for plain text display
      const tempDiv = document.createElement('div');
      tempDiv.innerHTML = m.mail_body || m.mail_excerpt || '(내용 없음)';
      document.getElementById('modalBody').textContent = tempDiv.innerText || tempDiv.textContent;

      document.getElementById('mailModal').classList.add('open');

      // Mark as read in local state
      const idx = emails.findIndex(e => e.mail_id === mailId);
      if (idx !== -1) emails[idx].mail_read = '1';
      renderInbox();
    } catch (e) {
      showToast('메일을 불러올 수 없습니다', true);
    }
  }

  function closeModal(e) {
    if (e.target === document.getElementById('mailModal')) closeModalDirect();
  }

  function closeModalDirect() {
    document.getElementById('mailModal').classList.remove('open');
  }

  // ─── SEND EMAIL ───────────────────────────────────────────────
  async function sendEmail() {
    const to = document.getElementById('sendTo').value.trim();
    const subject = document.getElementById('sendSubject').value.trim();
    const body = document.getElementById('sendBody').value.trim();

    if (!to || !subject || !body) {
      showToast('모든 필드를 입력해주세요', true);
      return;
    }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(to)) {
      showToast('올바른 이메일 주소를 입력해주세요', true);
      return;
    }

    const btn = document.getElementById('sendBtn');
    const status = document.getElementById('sendStatus');
    btn.disabled = true;
    status.style.display = 'block';

    try {
      const params = new URLSearchParams({
        f: 'send_email',
        sid_token: sessionToken,
        to: to,
        subject: subject,
        body: body,
        from: currentEmail
      });

      const res = await fetch(`${API}?${params.toString()}`);
      const data = await res.json();

      if (data.email_addr || data.ok || data.result === 'ok') {
        showToast('이메일이 전송되었습니다 ✓');
        document.getElementById('sendTo').value = '';
        document.getElementById('sendSubject').value = '';
        document.getElementById('sendBody').value = '';
      } else {
        showToast('전송에 실패했습니다. 다시 시도해주세요', true);
      }
    } catch (e) {
      showToast('전송 중 오류가 발생했습니다', true);
    }

    btn.disabled = false;
    status.style.display = 'none';
  }

  // ─── TIMER ───────────────────────────────────────────────────
  function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      timerSec--;
      if (timerSec <= 0) {
        clearInterval(timerInterval);
        document.getElementById('timerDisplay').textContent = '만료됨';
        showToast('이메일 주소가 만료되었습니다. 새 주소를 생성하세요', true);
        return;
      }
      const m = Math.floor(timerSec / 60);
      const s = timerSec % 60;
      document.getElementById('timerDisplay').textContent =
        `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }, 1000);
  }

  function startAutoRefresh() {
    if (refreshInterval) clearInterval(refreshInterval);
    refreshInterval = setInterval(checkMail, 15000); // 15초마다
  }

  // ─── UTILS ───────────────────────────────────────────────────
  function formatTime(ts) {
    const d = new Date(ts * 1000);
    const now = new Date();
    const diff = (now - d) / 1000;
    if (diff < 60) return '방금 전';
    if (diff < 3600) return `${Math.floor(diff/60)}분 전`;
    if (diff < 86400) return `${Math.floor(diff/3600)}시간 전`;
    return d.toLocaleDateString('ko-KR', { month:'short', day:'numeric' });
  }

  function escHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function randomStr(n) {
    const c = 'abcdefghijklmnopqrstuvwxyz0123456789';
    return Array.from({length: n}, () => c[Math.floor(Math.random() * c.length)]).join('');
  }

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => { t.className = 'toast'; }, 3000);
  }

  // ─── START ───────────────────────────────────────────────────
  init();
</script>
</body>
