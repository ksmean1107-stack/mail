<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEMPMAIL — 임시 이메일</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --accent: #00ff88;
    --accent2: #ff3c6f;
    --text: #e8e8f0;
    --muted: #555570;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'Space Mono', monospace;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-display); overflow-x: hidden; }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }
  .wrapper { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 40px 20px 80px; }
  header { display: flex; align-items: baseline; gap: 16px; margin-bottom: 60px; animation: fadeDown 0.6s ease both; }
  header h1 { font-size: clamp(2rem, 6vw, 3.2rem); font-weight: 800; letter-spacing: -2px; line-height: 1; }
  header h1 span { color: var(--accent); }
  header .tagline { font-family: var(--font-mono); font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; border-left: 2px solid var(--border); padding-left: 12px; }
  .email-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 32px; margin-bottom: 24px; animation: fadeUp 0.6s 0.1s ease both; position: relative; overflow: hidden; }
  .email-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--accent), transparent); }
  .email-label { font-family: var(--font-mono); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 3px; color: var(--accent); margin-bottom: 12px; }
  .email-display { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .email-address { font-family: var(--font-mono); font-size: clamp(1rem, 3vw, 1.4rem); font-weight: 700; color: var(--text); letter-spacing: -0.5px; flex: 1; min-width: 200px; word-break: break-all; }
  .email-address .domain { color: var(--muted); }
  .btn { font-family: var(--font-mono); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; padding: 10px 20px; border: 1px solid; border-radius: 2px; cursor: pointer; transition: all 0.15s ease; white-space: nowrap; background: transparent; }
  .btn-copy { border-color: var(--accent); color: var(--accent); }
  .btn-copy:hover, .btn-copy.copied { background: var(--accent); color: var(--bg); }
  .btn-new { border-color: var(--muted); color: var(--muted); }
  .btn-new:hover { border-color: var(--text); color: var(--text); }
  .btn-send { border-color: var(--accent); color: var(--accent); padding: 12px 28px; font-size: 0.75rem; }
  .btn-send:hover { background: var(--accent); color: var(--bg); }
  .btn-send:disabled { opacity: 0.3; cursor: not-allowed; }
  .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }
  .timer { font-family: var(--font-mono); font-size: 0.65rem; color: var(--muted); margin-left: auto; }
  .timer span { color: var(--accent); }
  .inbox-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; animation: fadeUp 0.6s 0.2s ease both; }
  .inbox-title { font-size: 0.8rem; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 3px; color: var(--muted); }
  .badge { background: var(--accent); color: var(--bg); font-family: var(--font-mono); font-size: 0.6rem; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
  .refresh-btn { font-family: var(--font-mono); font-size: 0.65rem; color: var(--muted); background: none; border: 1px solid var(--border); padding: 6px 14px; border-radius: 2px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.15s; }
  .refresh-btn:hover { color: var(--text); border-color: var(--muted); }
  .refresh-btn.spinning .icon { animation: spin 0.6s linear infinite; }
  .inbox-list { display: flex; flex-direction: column; gap: 2px; animation: fadeUp 0.6s 0.3s ease both; }
  .empty-state { background: var(--surface); border: 1px dashed var(--border); border-radius: 4px; padding: 48px; text-align: center; color: var(--muted); font-family: var(--font-mono); font-size: 0.75rem; line-height: 2; }
  .empty-state .big { font-size: 2rem; display: block; margin-bottom: 12px; opacity: 0.3; }
  .mail-item { background: var(--surface); border: 1px solid var(--border); border-radius: 2px; padding: 16px 20px; cursor: pointer; transition: all 0.15s ease; display: grid; grid-template-columns: 1fr auto; gap: 4px 16px; align-items: start; }
  .mail-item:hover { border-color: var(--accent); background: #161622; }
  .mail-item.unread { border-left: 2px solid var(--accent); }
  .mail-from { font-family: var(--font-mono); font-size: 0.75rem; color: var(--text); font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .mail-subject { font-size: 0.85rem; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; grid-column: 1; }
  .mail-item.unread .mail-subject { color: var(--text); }
  .mail-time { font-family: var(--font-mono); font-size: 0.65rem; color: var(--muted); grid-row: 1 / 3; grid-column: 2; align-self: center; white-space: nowrap; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s ease; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; width: 100%; max-width: 640px; max-height: 80vh; overflow-y: auto; position: relative; transform: translateY(20px); transition: transform 0.2s ease; }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal::before { content: ''; position: sticky; top: 0; display: block; height: 2px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  .modal-header { padding: 24px 28px 16px; border-bottom: 1px solid var(--border); }
  .modal-subject { font-size: 1.1rem; font-weight: 700; margin-bottom: 12px; }
  .modal-meta { font-family: var(--font-mono); font-size: 0.65rem; color: var(--muted); display: flex; flex-direction: column; gap: 4px; }
  .modal-meta span { color: var(--text); }
  .modal-body { padding: 24px 28px; font-size: 0.9rem; line-height: 1.7; color: var(--text); white-space: pre-wrap; word-break: break-word; }
  .modal-close { position: absolute; top: 16px; right: 20px; background: none; border: none; color: var(--muted); font-size: 1.4rem; cursor: pointer; line-height: 1; transition: color 0.15s; }
  .modal-close:hover { color: var(--accent2); }
  .compose-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 28px 32px; margin-top: 32px; animation: fadeUp 0.6s 0.4s ease both; position: relative; overflow: hidden; }
  .compose-panel::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--accent2), transparent); }
  .compose-title { font-family: var(--font-mono); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 3px; color: var(--accent2); margin-bottom: 20px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-family: var(--font-mono); font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-bottom: 6px; }
  .field input, .field textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 2px; padding: 10px 14px; color: var(--text); font-family: var(--font-mono); font-size: 0.8rem; outline: none; transition: border-color 0.15s; }
  .field input:focus, .field textarea:focus { border-color: var(--accent2); }
  .field textarea { resize: vertical; min-height: 100px; line-height: 1.6; }
  .compose-actions { display: flex; align-items: center; gap: 12px; margin-top: 8px; }
  .send-status { font-family: var(--font-mono); font-size: 0.7rem; color: var(--accent); display: none; }
  .status-bar { font-family: var(--font-mono); font-size: 0.65rem; color: var(--muted); margin-bottom: 24px; padding: 10px 16px; border: 1px solid var(--border); border-radius: 2px; background: var(--surface); }
  .status-bar .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--muted); margin-right: 8px; }
  .status-bar.ok .dot { background: var(--accent); }
  .status-bar.err .dot { background: var(--accent2); }
  .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--accent); color: var(--bg); font-family: var(--font-mono); font-size: 0.7rem; font-weight: 700; padding: 10px 24px; border-radius: 2px; z-index: 200; opacity: 0; transition: all 0.3s ease; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--accent2); color: #fff; }
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: none; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
  @keyframes spin { to { transform: rotate(360deg); } }
  .icon { display: inline-block; }
  @media (max-width: 520px) {
    .email-display { flex-direction: column; align-items: flex-start; }
    .controls { justify-content: flex-start; }
    .timer { margin-left: 0; width: 100%; }
    .compose-panel { padding: 20px; }
  }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <h1>TEMP<span>MAIL</span></h1>
    <p class="tagline">일회용 이메일<br>즉시 생성</p>
  </header>

  <div class="status-bar" id="statusBar"><span class="dot"></span><span id="statusText">연결 중...</span></div>

  <div class="email-card">
    <div class="email-label">// 현재 이메일 주소</div>
    <div class="email-display">
      <div class="email-address" id="emailDisplay">
        <span id="emailUser">생성 중...</span><span class="domain" id="emailDomain"></span>
      </div>
      <button class="btn btn-copy" id="copyBtn" onclick="copyEmail()">복사</button>
    </div>
    <div class="controls">
      <button class="btn btn-new" onclick="generateNew()">새 주소 생성</button>
      <div class="timer">자동 새로고침 <span id="timerDisplay">—</span></div>
    </div>
  </div>

  <div class="inbox-header">
    <div class="inbox-title">받은 편지함 <span class="badge" id="unreadBadge" style="display:none">0</span></div>
    <button class="refresh-btn" id="refreshBtn" onclick="checkMail()">
      <span class="icon" id="refreshIcon">↻</span> 새로고침
    </button>
  </div>
  <div class="inbox-list" id="inboxList">
    <div class="empty-state"><span class="big">📭</span>받은 메일이 없습니다<br>이 주소로 이메일을 보내보세요</div>
  </div>

  <div class="compose-panel">
    <div class="compose-title">// 이메일 보내기</div>
    <div class="field"><label>받는 사람</label><input type="email" id="sendTo" placeholder="example@domain.com"></div>
    <div class="field"><label>제목</label><input type="text" id="sendSubject" placeholder="제목을 입력하세요"></div>
    <div class="field"><label>내용</label><textarea id="sendBody" placeholder="내용을 입력하세요..."></textarea></div>
    <div class="compose-actions">
      <button class="btn btn-send" id="sendBtn" onclick="sendEmail()">전송</button>
      <span class="send-status" id="sendStatus">전송 중...</span>
    </div>
  </div>
</div>

<div class="modal-overlay" id="mailModal" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModalDirect()">×</button>
    <div class="modal-header">
      <div class="modal-subject" id="modalSubject"></div>
      <div class="modal-meta">
        <div>보낸 사람: <span id="modalFrom"></span></div>
        <div>받은 시간: <span id="modalTime"></span></div>
      </div>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── STATE ──────────────────────────────────────────────────────
  const API = '/api/proxy';
  let token = '';
  let currentEmail = '';
  let accountId = '';
  let emails = [];
  let refreshInterval = null;
  let countdown = 15;

  // ── INIT ───────────────────────────────────────────────────────
  async function init() {
    setStatus('연결 중...', false);
    await createAccount();
    startAutoRefresh();
  }

  // ── CREATE ACCOUNT ─────────────────────────────────────────────
  async function createAccount() {
    try {
      // 1. 사용 가능한 도메인 가져오기
      let domain = 'wshu.net'; // fallback
      try {
        const domRes = await fetch(`${API}?path=domains`);
        const raw = await domRes.json();
        const domList = raw['hydra:member'] || raw.member || (Array.isArray(raw) ? raw : []);
        if (domList.length > 0 && domList[0].domain) domain = domList[0].domain;
      } catch (_) {}

      // 2. 랜덤 계정 생성
      const user = randomStr(10);
      const pass = randomStr(16);
      const address = `${user}@${domain}`;

      const accRes = await fetch(`${API}?path=accounts`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ address, password: pass })
      });
      const accData = await accRes.json();
      if (!accData.id) throw new Error(accData['hydra:description'] || '계정 생성 실패');
      accountId = accData.id;

      // 3. 토큰 발급
      const tokenRes = await fetch(`${API}?path=token`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ address, password: pass })
      });
      const tokenData = await tokenRes.json();
      if (!tokenData.token) throw new Error('토큰 발급 실패');
      token = tokenData.token;
      currentEmail = address;

      displayEmail(address);
      setStatus('연결됨 — mail.tm', true);
      checkMail();
    } catch (e) {
      setStatus('오류: ' + e.message, false, true);
      showToast('계정 생성 실패: ' + e.message, true);
    }
  }

  function displayEmail(email) {
    const [user, domain] = email.split('@');
    document.getElementById('emailUser').textContent = user;
    document.getElementById('emailDomain').textContent = `@${domain}`;
  }

  // ── NEW ADDRESS ─────────────────────────────────────────────────
  async function generateNew() {
    emails = [];
    renderInbox();
    token = ''; accountId = ''; currentEmail = '';
    document.getElementById('emailUser').textContent = '생성 중...';
    document.getElementById('emailDomain').textContent = '';
    await createAccount();
    showToast('새 이메일 주소가 생성되었습니다');
  }

  // ── COPY ────────────────────────────────────────────────────────
  function copyEmail() {
    if (!currentEmail) return;
    navigator.clipboard.writeText(currentEmail).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = '복사됨!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '복사'; btn.classList.remove('copied'); }, 1500);
      showToast('클립보드에 복사되었습니다');
    });
  }

  // ── CHECK MAIL ──────────────────────────────────────────────────
  async function checkMail() {
    if (!token) return;
    const btn = document.getElementById('refreshBtn');
    btn.classList.add('spinning');
    try {
      const res = await fetch(`${API}?path=messages`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await res.json();
      const list = data['hydra:member'] || data.member || [];

      const prevCount = emails.length;
      emails = list;
      renderInbox();
      if (list.length > prevCount && prevCount >= 0) {
        showToast(`새 메일 ${list.length - prevCount}개 도착!`);
      }
    } catch (e) {
      // silent
    }
    btn.classList.remove('spinning');
  }

  function renderInbox() {
    const list = document.getElementById('inboxList');
    const badge = document.getElementById('unreadBadge');
    if (!emails.length) {
      badge.style.display = 'none';
      list.innerHTML = `<div class="empty-state"><span class="big">📭</span>받은 메일이 없습니다<br>이 주소로 이메일을 보내보세요</div>`;
      return;
    }
    const unread = emails.filter(m => !m.seen).length;
    badge.style.display = unread ? '' : 'none';
    if (unread) badge.textContent = unread;
    list.innerHTML = emails.map(m => `
      <div class="mail-item ${!m.seen ? 'unread' : ''}" onclick="openMail('${m.id}')">
        <div class="mail-from">${escHtml(m.from?.address || m.from?.name || '알 수 없음')}</div>
        <div class="mail-time">${formatTime(m.createdAt)}</div>
        <div class="mail-subject">${escHtml(m.subject) || '(제목 없음)'}</div>
      </div>
    `).join('');
  }

  async function openMail(id) {
    if (!token) return;
    try {
      const res = await fetch(`${API}?path=messages/${id}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const m = await res.json();
      document.getElementById('modalSubject').textContent = m.subject || '(제목 없음)';
      document.getElementById('modalFrom').textContent = m.from?.address || m.from?.name || '알 수 없음';
      document.getElementById('modalTime').textContent = new Date(m.createdAt).toLocaleString('ko-KR');

      // HTML 또는 텍스트 본문
      if (m.html && m.html.length) {
        const tmp = document.createElement('div');
        tmp.innerHTML = Array.isArray(m.html) ? m.html.join('') : m.html;
        document.getElementById('modalBody').textContent = tmp.innerText || tmp.textContent;
      } else {
        document.getElementById('modalBody').textContent = m.text || '(내용 없음)';
      }

      document.getElementById('mailModal').classList.add('open');
      const idx = emails.findIndex(e => e.id === id);
      if (idx !== -1) emails[idx].seen = true;
      renderInbox();
    } catch (e) {
      showToast('메일을 불러올 수 없습니다', true);
    }
  }

  function closeModal(e) { if (e.target === document.getElementById('mailModal')) closeModalDirect(); }
  function closeModalDirect() { document.getElementById('mailModal').classList.remove('open'); }

  // ── SEND EMAIL ──────────────────────────────────────────────────
  // Mail.tm은 수신 전용 API라 발신은 SMTP 필요 — mailto로 대체
  async function sendEmail() {
    const to = document.getElementById('sendTo').value.trim();
    const subject = document.getElementById('sendSubject').value.trim();
    const body = document.getElementById('sendBody').value.trim();
    if (!to || !subject || !body) { showToast('모든 필드를 입력해주세요', true); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(to)) { showToast('올바른 이메일 주소를 입력해주세요', true); return; }

    // mailto 링크로 기본 메일 앱 열기
    const mailto = `mailto:${encodeURIComponent(to)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    window.open(mailto);
    showToast('메일 앱이 열립니다');
  }

  // ── AUTO REFRESH ────────────────────────────────────────────────
  function startAutoRefresh() {
    if (refreshInterval) clearInterval(refreshInterval);
    countdown = 15;
    refreshInterval = setInterval(() => {
      countdown--;
      document.getElementById('timerDisplay').textContent = `${countdown}초`;
      if (countdown <= 0) {
        countdown = 15;
        checkMail();
      }
    }, 1000);
  }

  // ── STATUS BAR ──────────────────────────────────────────────────
  function setStatus(msg, ok, err) {
    const bar = document.getElementById('statusBar');
    bar.className = 'status-bar' + (ok ? ' ok' : err ? ' err' : '');
    document.getElementById('statusText').textContent = msg;
  }

  // ── UTILS ────────────────────────────────────────────────────────
  function formatTime(ts) {
    const d = new Date(ts);
    const diff = (Date.now() - d) / 1000;
    if (diff < 60) return '방금 전';
    if (diff < 3600) return `${Math.floor(diff/60)}분 전`;
    if (diff < 86400) return `${Math.floor(diff/3600)}시간 전`;
    return d.toLocaleDateString('ko-KR', { month:'short', day:'numeric' });
  }
  function escHtml(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function randomStr(n) {
    return Array.from({length: n}, () => 'abcdefghijklmnopqrstuvwxyz0123456789'[Math.floor(Math.random()*36)]).join('');
  }
  function showToast(msg, isError=false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => { t.className = 'toast'; }, 3000);
  }

  init();
</script>
</body>
</html>
